; PlatformIO configuration for OBD-II ESP32 firmware
; Target board: ESP32 DevKit V1 with SN65HVD230 CAN transceiver

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor speed
monitor_speed = 115200

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_NIMBLE_ENABLED=1

; Library dependencies:
;   ESP32-TWAI-CAN  – thin CAN wrapper around the ESP32 TWAI peripheral
;   NimBLE-Arduino  – lightweight BLE stack (uses ~50 % less RAM than BT classic)
lib_deps =
    https://github.com/handmade0octopus/ESP32-TWAI-CAN.git
    h2zero/NimBLE-Arduino @ ^1.4.2

; PlatformIO upload & monitor settings
upload_speed   = 921600
monitor_filters = esp32_exception_decoder
